<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="980" viewBox="0 0 1100 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070b16"/>
      <stop offset="1" stop-color="#040713"/>
    </linearGradient>

    <pattern id="hatch" patternUnits="userSpaceOnUse" width="12" height="12" patternTransform="rotate(25)">
      <rect width="12" height="12" fill="transparent"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="rgba(255,255,255,0.06)" stroke-width="6"/>
    </pattern>

    <filter id="glowCyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowOrange" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title{font:700 32px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#e9f6ff;letter-spacing:2px}
      .subtitle{font:600 20px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:rgba(233,246,255,0.78);letter-spacing:1px}
      .label{font:600 22px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#e9f6ff}
      .mono{font:700 22px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New";fill:#e9f6ff;letter-spacing:1px}
      .small{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New";fill:rgba(233,246,255,0.72);letter-spacing:1px}
      .arrow{stroke:rgba(233,246,255,0.35);stroke-width:3;fill:none}
      .arrowHead{fill:rgba(233,246,255,0.35)}
      .panel{fill:rgba(16,22,38,0.6);stroke:rgba(233,246,255,0.18);stroke-width:2}
      .panelHatch{fill:url(#hatch);opacity:0.35}
      .boxC{fill:rgba(0,0,0,0.22);stroke:rgba(0,242,255,0.65);stroke-width:4}
      .boxO{fill:rgba(0,0,0,0.22);stroke:rgba(255,170,0,0.72);stroke-width:4}
      .boxG{fill:rgba(0,0,0,0.22);stroke:rgba(80,235,160,0.75);stroke-width:4}
    </style>

    <marker id="m" viewBox="0 0 12 12" refX="10.5" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" class="arrowHead"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1100" height="980" fill="url(#bg)"/>

  <g opacity="0.18">
    <rect x="0" y="0" width="1100" height="980" fill="url(#hatch)"/>
  </g>

  <g transform="translate(80,60)">
    <text class="title">System Architecture</text>
  </g>

  <g transform="translate(80,110)">
    <text class="subtitle">Frontend: React + R3F</text>
  </g>

  <g transform="translate(70,140)">
    <rect class="panel" x="0" y="0" width="960" height="360" rx="18"/>
    <rect class="panelHatch" x="0" y="0" width="960" height="360" rx="18"/>

    <g filter="url(#glowCyan)">
      <rect class="boxC" x="70" y="90" width="340" height="92" rx="14"/>
      <rect class="boxC" x="550" y="90" width="320" height="92" rx="14"/>
      <rect class="boxC" x="270" y="230" width="420" height="92" rx="14"/>
    </g>

    <text class="mono" x="100" y="150">UI Layer / HUD</text>
    <text class="mono" x="635" y="150">3D Layer</text>
    <text class="mono" x="370" y="290">Zustand Store</text>

    <path class="arrow" marker-end="url(#m)" d="M 240 182 C 250 225, 290 235, 350 250"/>
    <path class="arrow" marker-end="url(#m)" d="M 710 182 C 700 225, 650 235, 600 250"/>
  </g>

  <g transform="translate(0,530)">
    <text class="mono" x="520" y="0" text-anchor="middle">HTTP / SSE</text>
    <path class="arrow" marker-end="url(#m)" d="M 550 20 L 550 85"/>
  </g>

  <g transform="translate(80,620)">
    <text class="subtitle">Backend: FastAPI</text>
  </g>

  <g transform="translate(70,650)">
    <rect class="panel" x="0" y="0" width="560" height="300" rx="18"/>
    <rect class="panelHatch" x="0" y="0" width="560" height="300" rx="18"/>

    <g filter="url(#glowOrange)">
      <rect class="boxO" x="120" y="40" width="320" height="92" rx="14"/>
      <rect class="boxO" x="120" y="150" width="320" height="92" rx="14"/>
      <rect class="boxO" x="120" y="260" width="320" height="92" rx="14" transform="translate(0,-70)"/>
    </g>

    <text class="mono" x="210" y="98">API Router</text>
    <text class="mono" x="196" y="208">Service Layer</text>
    <text class="mono" x="210" y="318" transform="translate(0,-70)">Gemini SDK</text>

    <path class="arrow" marker-end="url(#m)" d="M 280 134 L 280 148"/>
    <path class="arrow" marker-end="url(#m)" d="M 280 244 L 280 258"/>
  </g>

  <g transform="translate(680,650)">
    <g>
      <rect class="panel" x="0" y="0" width="350" height="300" rx="18"/>
      <rect class="panelHatch" x="0" y="0" width="350" height="300" rx="18"/>
      <text class="mono" x="175" y="46" text-anchor="middle">Data Layer</text>
    </g>

    <g filter="url(#glowGreen)">
      <g transform="translate(75,95)">
        <ellipse class="boxG" cx="0" cy="40" rx="78" ry="24"/>
        <rect class="boxG" x="-78" y="40" width="156" height="92" rx="10"/>
        <ellipse class="boxG" cx="0" cy="132" rx="78" ry="24"/>
        <text class="mono" x="0" y="100" text-anchor="middle">SQLite</text>
      </g>

      <g transform="translate(275,95)">
        <ellipse class="boxG" cx="0" cy="40" rx="90" ry="24"/>
        <rect class="boxG" x="-90" y="40" width="180" height="92" rx="10"/>
        <ellipse class="boxG" cx="0" cy="132" rx="90" ry="24"/>
        <text class="mono" x="0" y="100" text-anchor="middle">ChromaDB</text>
      </g>
    </g>
  </g>

  <path class="arrow" marker-end="url(#m)" d="M 460 800 C 560 820, 620 820, 680 820"/>
</svg>
